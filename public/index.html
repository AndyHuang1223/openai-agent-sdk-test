<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Chat UI</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <div class="topbar">
        <h1>OpenAI Agent 聊天室</h1>
        <button id="clear-btn" type="button">清空對話</button>
      </div>
      <div id="messages" class="messages" aria-live="polite"></div>
      <form id="chat-form" class="composer">
        <input
          id="user-input"
          type="text"
          placeholder="輸入訊息..."
          autocomplete="off"
          required
        />
        <button id="send-btn" type="submit">送出</button>
      </form>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
